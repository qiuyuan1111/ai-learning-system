name: CI

on:
  push:
    branches: [develop, main, 'feature/**']
  pull_request:
    branches: [develop]

jobs:
  # ───────── TypeScript 共享库 ─────────
  common-ts:
    name: common (TypeScript) build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: common
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: common/package.json
      - run: npm install
      - run: npm run build
      - run: npm test

  # ───────── Python 共享库 ─────────
  common-py:
    name: common (Python) build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: common/python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -e . pytest
      - run: pytest -q

  # ───────── 资源生成编排器 ─────────
  resource-gen:
    name: resource-gen lint & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agents/resource-gen
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install common lib
        run: pip install -e ../../common/python
      - name: Install deps
        run: pip install -r requirements.txt pytest pytest-asyncio httpx
      - name: Lint (compile check)
        run: python -m compileall -q src
      - name: Test
        run: pytest -q tests/

  # ───────── 路径规划智能体 ─────────
  path-planner:
    name: path-planner lint & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agents/path-planner
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install common lib
        run: pip install -e ../../common/python
      - name: Install deps
        run: pip install -r requirements.txt pytest pytest-asyncio httpx
      - name: Lint (compile check)
        run: python -m compileall -q src
      - name: Test
        run: pytest -q tests/

  # ───────── 接口契约一致性 ─────────
  api-contract:
    name: API contract smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check api.md exists and non-empty
        run: test -s docs/api.md || test -s api.md
      - name: Placeholder
        run: echo "契约冒烟：验证各服务路由与 api.md 一致（详见测试套件）"
