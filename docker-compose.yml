version: "3.9"

services:
  profile:
    build:
      context: .
      dockerfile: agents/profile/Dockerfile
    ports:
      - "8081:8081"
    env_file:
      - .env
    volumes:
      - ./agents/profile/src:/app/agents/profile/src
      - ./common:/app/common

  tutor:
    build:
      context: .
      dockerfile: agents/tutor/Dockerfile
    ports:
      - "8082:8082"
    env_file:
      - .env
    volumes:
      - ./agents/tutor/src:/app/agents/tutor/src
      - ./common:/app/common

  evaluator:
    build:
      context: .
      dockerfile: agents/evaluator/Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - ./agents/evaluator/src:/app/agents/evaluator/src
      - ./common:/app/common

  safety:
    build:
      context: .
      dockerfile: agents/safety/Dockerfile
    ports:
      - "8083:8083"
    env_file:
      - .env
    volumes:
      - ./agents/safety/src:/app/agents/safety/src
      - ./common:/app/common
